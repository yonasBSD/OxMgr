name: Benchmarks

on:
  workflow_dispatch:
  schedule:
    - cron: "23 5 * * 1"

concurrency:
  group: benchmarks
  cancel-in-progress: false

jobs:
  compare:
    name: oxmgr vs pm2
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pm2
        run: npm install -g pm2@5.4.3

      - name: Run benchmark suite
        run: |
          set -euo pipefail
          python3 scripts/benchmark_oxmgr_vs_pm2.py \
            --output-dir bench/results/github \
            --process-counts 1,25,100 \
            --boot-trials 3 \
            --scale-trials 3 \
            --list-samples 7 \
            --restart-samples 7 \
            --crash-samples 7

      - name: Refresh BENCHMARK.md
        run: |
          set -euo pipefail
          {
            echo '<!-- This file is generated by .github/workflows/benchmark.yml. -->'
            echo
            echo '> Latest committed benchmark result from the automated `oxmgr` vs `pm2` workflow.'
            echo '>'
            echo '> Methodology and local repro steps: [docs/BENCHMARKS.md](./docs/BENCHMARKS.md)'
            echo
            cat bench/results/github/summary.md
          } > BENCHMARK.md

      - name: Publish step summary
        run: cat bench/results/github/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Commit latest benchmark snapshot
        if: github.ref_type == 'branch'
        run: |
          set -euo pipefail
          if git diff --quiet -- BENCHMARK.md; then
            echo "BENCHMARK.md already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add BENCHMARK.md
          git commit -m "docs: update latest benchmark"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oxmgr-vs-pm2-benchmarks
          path: |
            BENCHMARK.md
            bench/results/github/report.json
            bench/results/github/summary.md
